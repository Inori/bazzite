name: Build ISOs

on:
  workflow_dispatch:
  workflow_call:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-iso
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - bazzite
          - bazzite-nvidia
          - bazzite-nvidia-open
          # - bazzite-gnome
          # - bazzite-gnome-nvidia
          # - bazzite-gnome-nvidia-open
          # - bazzite-deck
          # - bazzite-deck-gnome
          # - bazzite-ally
          # - bazzite-ally-gnome
          # - bazzite-asus
          # - bazzite-gnome-asus
          # - bazzite-asus-nvidia
          # - bazzite-gnome-asus-nvidia
          # - bazzite-asus-nvidia-open
          # - bazzite-gnome-asus-nvidia-open
          # - bazzite-surface
          # - bazzite-gnome-surface
          # - bazzite-surface-nvidia-open
          # - bazzite-gnome-surface-nvidia-open
          # - bazzite-deck-nvidia
          # - bazzite-deck-nvidia-gnome
        major_version: [43]
    steps:

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Set Image Tag
        id: generate-tag
        shell: bash
        run: |
          TAG="stable"

          if [[ "${{ github.ref_name }}" == "testing" ]]; then
              TAG="testing"
          fi

          # Would like to implement in the future. This will allow us to support image tags from a PR.
          #if [[ github.event.number ]]; then
          #  TAG="pr-${{ github.event.number }}-${{ matrix.major_version }}"
          #fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set Flatpaks Directory Shortname
        id: generate-flatpak-dir-shortname
        shell: bash
        run: |
          FLATPAK_DIR_SHORTNAME="installer/kde_flatpaks"

          if [[ "${{ matrix.image_name }}" =~ "gnome" ]]; then
            FLATPAK_DIR_SHORTNAME="installer/gnome_flatpaks"
          fi

          echo "flatpak-dir-shortname=${FLATPAK_DIR_SHORTNAME}" >> $GITHUB_OUTPUT

      - name: Set Extra Boot Params
        id: generate-extra-params
        shell: bash
        run: |
          EXTRA_BOOT_PARAMS=""

          if [[ "${{ matrix.image_name }}" =~ "deck" ]]; then
            EXTRA_BOOT_PARAMS="inst.resolution=1280x800"
          fi

          echo "extra-boot-params=${EXTRA_BOOT_PARAMS}" >> $GITHUB_OUTPUT

      # Docker requires lowercase registry references

      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@d0603cd0a7dd490be678164909f65c7737470a7f # v6
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Determine Flatpak Dependencies
        id: flatpak_dependencies
        shell: bash
        run: |
          set -ex
          image="${{ steps.registry_case.outputs.lowercase }}/${{ matrix.image_name }}:${{ steps.generate-tag.outputs.tag }}"
          # Make temp space
          TEMP_FLATPAK_INSTALL_DIR=$(mktemp -d -p ${{ github.workspace }} flatpak.XXX)
          # Get list of refs from directory
          FLATPAK_REFS_DIR=${{ github.workspace }}/${{ steps.generate-flatpak-dir-shortname.outputs.flatpak-dir-shortname }}
          FLATPAK_REFS_DIR_LIST=$(cat ${FLATPAK_REFS_DIR}/* | tr '\n' ' ' )
          # Generate install script
          cat << EOF > ${TEMP_FLATPAK_INSTALL_DIR}/script.sh
          cat /temp_flatpak_install_dir/script.sh
          mkdir -p /flatpak/flatpak /flatpak/triggers
          mkdir /var/tmp || true
          chmod -R 1777 /var/tmp
          flatpak config --system --set languages "*"
          flatpak remote-add --system flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --system -y ${FLATPAK_REFS_DIR_LIST}
          ostree refs --repo=\${FLATPAK_SYSTEM_DIR}/repo | grep '^deploy/' | grep -v 'org\.freedesktop\.Platform\.openh264' | sed 's/^deploy\///g' > /output/flatpaks_with_deps
          EOF
          docker run --rm --privileged \
            --entrypoint bash \
            -e FLATPAK_SYSTEM_DIR=/flatpak/flatpak \
            -e FLATPAK_TRIGGERSDIR=/flatpak/triggers \
            --volume ${FLATPAK_REFS_DIR}:/output \
            --volume ${TEMP_FLATPAK_INSTALL_DIR}:/temp_flatpak_install_dir \
            ${image} /temp_flatpak_install_dir/script.sh
          docker rmi ${image}

      - name: Setup Bazzite Repo
        id: setup-bazzite-repo
        shell: bash
        run: |
          curl -Lo ${{ github.workspace }}/bazzite.repo https://copr.fedorainfracloud.org/coprs/ublue-os/bazzite/repo/fedora-${{ matrix.major_version }}/bazzite-org-bazzite-fedora-${{ matrix.major_version }}.repo

      - name: Build ISOs
        uses: jasonn3/build-container-installer@c9ef3de33236e66781ec37bd0485e8009eaefe24 # v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ${{ steps.registry_case.outputs.lowercase }}
          variant: 'Kinoite'
          version: ${{ matrix.major_version }}
          image_tag: ${{ steps.generate-tag.outputs.tag }}
          secure_boot_key_url: '${{ github.server_url }}/${{ github.repository }}/raw/main/secure_boot.der'
          enrollment_password: 'universalblue'
          iso_name: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-amd64.iso
          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"
          flatpak_remote_refs_dir: ${{ steps.generate-flatpak-dir-shortname.outputs.flatpak-dir-shortname }}
          enable_flatpak_dependencies: "false"
          extra_boot_params: ${{ steps.generate-extra-params.outputs.extra-boot-params }}
          additional_templates: '/github/workspace/installer/lorax_templates/remove_root_password_prompt.tmpl /github/workspace/installer/lorax_templates/set_default_user.tmpl /github/workspace/installer/lorax_templates/bazzite_patches.tmpl'
          repos: '/github/workspace/bazzite.repo /etc/yum.repos.d/fedora.repo /etc/yum.repos.d/fedora-updates.repo'

      - name: Patch pxeboot initrd
        shell: bash
        run: |
          set -euo pipefail

          ISO_DIR=$(readlink -f "${{ steps.build.outputs.iso_path }}")
          ISO_NAME="${{ steps.build.outputs.iso_name }}"
          OUTPUT_INITRD_NAME="${{ matrix.image_name }}-initrd.img"

          docker run --rm \
            --volume "${ISO_DIR}:/iso" \
            --env ISO_NAME="${ISO_NAME}" \
            --env OUTPUT_INITRD_NAME="${OUTPUT_INITRD_NAME}" \
            quay.io/fedora/fedora:43 \
            bash -seuo pipefail <<'CONTAINER_SCRIPT'
          dnf install -y cpio file gzip isomd5sum xorriso xz zstd

          WORKDIR=$(mktemp -d)
          trap 'rm -rf "$WORKDIR"' EXIT

          ISO_PATH="/iso/${ISO_NAME}"
          ORIG_INITRD="$WORKDIR/initrd.orig.img"
          INITRD_WORK="$WORKDIR/initrd-work"
          FIXED_INITRD="$WORKDIR/initrd.fixed.img"

          PATCHED_ISO="$WORKDIR/${ISO_NAME}.patched"

          mkdir -p "$INITRD_WORK"

          xorriso -osirrox on -indev "$ISO_PATH" -extract /images/pxeboot/initrd.img "$ORIG_INITRD"

          FILE_INFO=$(file -b "$ORIG_INITRD")
          case "$FILE_INFO" in
            *"XZ compressed data"*)
              (cd "$INITRD_WORK" && xzcat "$ORIG_INITRD" | cpio -idmv)
              ;;
            *"gzip compressed data"*)
              (cd "$INITRD_WORK" && gzip -dc "$ORIG_INITRD" | cpio -idmv)
              ;;
            *"Zstandard compressed data"*)
              (cd "$INITRD_WORK" && zstd -dc "$ORIG_INITRD" | cpio -idmv)
              ;;
            *)
              echo "::error::Unsupported initrd compression: $FILE_INFO"
              exit 1
              ;;
          esac

          if [ ! -e "$INITRD_WORK/sbin" ]; then
            mkdir -p "$INITRD_WORK/sbin"
          fi
          mkdir -p "$INITRD_WORK/etc/modules-load.d"
          if [ -e "$INITRD_WORK/sbin/mount.ntfs" ]; then
            mv "$INITRD_WORK/sbin/mount.ntfs" "$INITRD_WORK/sbin/mount.ntfs.orig"
          fi

          cat > "$INITRD_WORK/sbin/mount.ntfs" <<'EOF'
          #!/bin/sh
          # Redirect any "mount -t ntfs" to the in-kernel ntfs3 driver during initramfs.
          # Try to locate a usable mount binary.
          if command -v mount >/dev/null 2>&1; then
            MNT="$(command -v mount)"
          elif [ -x /usr/bin/mount ]; then
            MNT="/usr/bin/mount"
          elif [ -x /bin/mount ]; then
            MNT="/bin/mount"
          else
            # Fallback: hope PATH resolves it
            MNT="mount"
          fi
          exec "$MNT" -t ntfs3 "$@"
          EOF

          chmod 0755 "$INITRD_WORK/sbin/mount.ntfs"
          printf "ntfs3\nloop\niso9660\nsr_mod\n" > "$INITRD_WORK/etc/modules-load.d/early.conf"

          (
            cd "$INITRD_WORK"
            find . | cpio -H newc -o | xz -C crc32 -z -9e > "$FIXED_INITRD"
          )

          xorriso -indev "$ISO_PATH" \
            -outdev "$PATCHED_ISO" \
            -map "$FIXED_INITRD" /images/pxeboot/initrd.img \
            -boot_image any replay \
            -commit

          mv -f "$PATCHED_ISO" "$ISO_PATH"
          implantisomd5 "$ISO_PATH"
          checkisomd5 --verbose "$ISO_PATH"
          CONTAINER_SCRIPT


      - name: Move ISOs to Upload Directory
        id: upload-directory
        shell: bash
        run: |
          set -euo pipefail

          ISO_UPLOAD_DIR=${{ github.workspace }}/upload
          ISO_DIR=$(readlink -f "${{ steps.build.outputs.iso_path }}")
          ISO_NAME="${{ steps.build.outputs.iso_name }}"
          INITRD_NAME="${{ matrix.image_name }}-initrd.img"
          ISO_DEST=${ISO_UPLOAD_DIR}/${ISO_NAME}

          mkdir -p "${ISO_UPLOAD_DIR}"
          mv "${ISO_DIR}/${ISO_NAME}" "${ISO_DEST}"
          sha256sum "${ISO_DEST}" > "${ISO_DEST}-CHECKSUM"

          docker run --rm \
            --volume "${ISO_UPLOAD_DIR}:/artifacts" \
            --env ISO_NAME="${ISO_NAME}" \
            --env INITRD_NAME="${INITRD_NAME}" \
            quay.io/fedora/fedora:43 \
            bash -seuo pipefail <<'CONTAINER_SCRIPT'
          dnf install -y xorriso
          xorriso -osirrox on \
            -indev "/artifacts/${ISO_NAME}" \
            -extract /images/pxeboot/initrd.img "/artifacts/${INITRD_NAME}"
          CONTAINER_SCRIPT

          echo "iso-upload-dir=${ISO_UPLOAD_DIR}" >> "$GITHUB_OUTPUT"
          echo "iso-artifact-path=${ISO_DEST}" >> "$GITHUB_OUTPUT"
          echo "checksum-artifact-path=${ISO_DEST}-CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "initrd-artifact-path=${ISO_UPLOAD_DIR}/${INITRD_NAME}" >> "$GITHUB_OUTPUT"





      - name: Upload ISOs and Checksum to Job Artifacts
        if: github.ref_name == 'testing' || github.ref_name == 'main'
        #if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-${{ matrix.major_version}}
          path: |
            ${{ steps.upload-directory.outputs.iso-artifact-path }}
            ${{ steps.upload-directory.outputs.checksum-artifact-path }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true

      - name: Upload initrd to Job Artifacts
        if: github.ref_name == 'testing' || github.ref_name == 'main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-${{ matrix.major_version}}-initrd
          path: ${{ steps.upload-directory.outputs.initrd-artifact-path }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true


      - name: Upload ISOs and Checksum to R2
        if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
        shell: bash
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SOURCE_DIR: ${{ steps.upload-directory.outputs.iso-upload-dir }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone copy $SOURCE_DIR R2:bazzite
